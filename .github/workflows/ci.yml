name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -v

  audit:
    name: pip-audit (vulnerability scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Extract runtime dependencies from pyproject.toml
        run: |
          python - <<'PY' > requirements-runtime.txt
          import tomllib
          cfg = tomllib.load(open("pyproject.toml", "rb"))
          for dep in cfg["project"]["dependencies"]:
              # Strip environment markers; pip-audit handles the bare requirement.
              print(dep.split(";")[0].strip())
          PY
          cat requirements-runtime.txt

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Audit runtime dependencies
        run: pip-audit --strict --progress-spinner off --requirement requirements-runtime.txt
