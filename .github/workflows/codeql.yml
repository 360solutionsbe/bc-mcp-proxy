name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 04:00 UTC scan to catch newly disclosed CVEs.
    - cron: "0 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    # CodeQL upload requires GitHub Advanced Security on private repos (paid).
    # On public repos it's free and just works. Skip on private to avoid the
    # "Advanced Security must be enabled" error; the job auto-runs once the
    # repo is flipped to public.
    if: ${{ github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
