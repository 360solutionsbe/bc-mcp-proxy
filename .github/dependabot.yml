version: 2
updates:
  # Python deps from pyproject.toml + dxt/requirements.txt.
  # `directories` (plural, v2) lets one entry watch both. Groups bundle
  # related packages into a single weekly PR — one merge instead of N.
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/dxt"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Brussels"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      mcp-stack:
        patterns:
          - "mcp"
          - "httpx*"
          - "anyio"
      msal-stack:
        patterns:
          - "msal*"
      security-pins:
        # Transitive packages we explicitly == in dxt/requirements.txt
        # to force Snyk's GitHub-integrated static resolver to land on
        # patched versions. New CVEs in any of these should ship as one
        # weekly PR rather than eight separate ones.
        patterns:
          - "h11"
          - "cryptography"
          - "pyjwt"
          - "python-dotenv"
          - "python-multipart"
          - "requests"
          - "starlette"
          - "urllib3"
      test-stack:
        patterns:
          - "pytest*"

  # Pin GitHub Actions versions across workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Brussels"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"
