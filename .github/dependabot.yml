version: 2
updates:
  # Python runtime + test dependencies declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Brussels"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      mcp-stack:
        patterns:
          - "mcp"
          - "httpx"
          - "anyio"
      msal-stack:
        patterns:
          - "msal*"
      test-stack:
        patterns:
          - "pytest*"

  # Pin GitHub Actions versions across workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Brussels"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
